name: Update Events JSON
permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Google Sheets CSV
        run: |
          curl -L -o sheet.csv "https://docs.google.com/spreadsheets/d/e/2PACX-1vRj1ph9bBAsVVOoTruj-mYznqVPoFl8RpTK4ng5SPXBe00-N7DUrxsW3Vh_Nv0W2Xl-4PscSzpVXrzY/pub?output=csv"

      - name: Convert CSV to JSON
        run: |
          python3 << 'EOF'
          import csv
          import json
          from datetime import datetime

          FORMATS = [
              '%d.%m.%Y %H:%M:%S', '%d.%m.%Y %H:%M', '%d.%m.%Y',
              '%d/%m/%Y %H:%M:%S', '%d/%m/%Y %H:%M', '%d/%m/%Y',
              '%Y-%m-%d %H:%M:%S', '%Y-%m-%d %H:%M', '%Y-%m-%d',
              '%m/%d/%Y %H:%M:%S', '%m/%d/%Y %H:%M', '%m/%d/%Y',
          ]

          def parse_date(value):
              for fmt in FORMATS:
                  try:
                      return datetime.strptime(value.strip(), fmt)
                  except ValueError:
                      continue
              return None

          events = []
          with open('sheet.csv', newline='', encoding='utf-8') as f:
              for row in csv.DictReader(f):
                  if not any(row.values()):
                      continue
                  raw = row.get('Date', '')
                  dt = parse_date(raw)
                  if dt is None:
                      print(f'WARNING: could not parse date {raw!r} — row skipped')
                      continue
                  row['Date'] = dt.strftime('%Y-%m-%d %H:%M')
                  events.append(row)

          events.sort(key=lambda x: x['Date'])
          print(f'Saving {len(events)} events to events.json...')

          with open('assets/data/events.json', 'w', encoding='utf-8') as f:
              json.dump(events, f, indent=2, ensure_ascii=False)

          print('Done.')
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add assets/data/events.json
          git commit -m "Update events.json from Google Sheets" || echo "No changes"
          git push
