name: Update Events JSON
permissions:
  contents: write
  
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install pandas

      - name: Download and convert Google Sheets CSV to JSON
        run: |
          curl -L -o sheet.csv "https://docs.google.com/spreadsheets/d/e/2PACX-1vRj1ph9bBAsVVOoTruj-mYznqVPoFl8RpTK4ng5SPXBe00-N7DUrxsW3Vh_Nv0W2Xl-4PscSzpVXrzY/pub?output=csv"

          echo '
import pandas as pd
from datetime import datetime

print("Reading sheet.csv...")
df = pd.read_csv("sheet.csv")
print("Original rows:", len(df))

df = df.dropna(subset=["Date"])
df["Date"] = pd.to_datetime(df["Date"], errors="coerce")
print("After parsing dates:", len(df))

df = df[df["Date"].notna()]
df = df[df["Date"] >= pd.to_datetime(datetime.now().date())]
print("After filtering past dates:", len(df))

df = df.sort_values(by="Date")
df["Date"] = df["Date"].dt.strftime("%Y-%m-%d")

print("Saving to events.json...")
df.to_json("assets/data/events.json", orient="records", indent=2)
print("Done.")
' > convert.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add assets/data/events.json
          git commit -m "Update events.json from Google Sheets" || echo "No changes"
          git push
